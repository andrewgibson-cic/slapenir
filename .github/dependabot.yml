# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Rust dependencies (proxy)
  - package-ecosystem: "cargo"
    directory: "/proxy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "andrewgibson-cic"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    ignore:
      - dependency-name: "rand"
        update-types: ["version-update:semver-major"]
        # RUSTSEC-2026-0097: sqlx-postgres pins rand ^0.8, no 0.8.x patch available.
        # Awaiting sqlx 0.9 stable. Vulnerability requires custom logger calling
        # thread_rng during reseeding — not applicable to our codebase.
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Docker dependencies (proxy)
  - package-ecosystem: "docker"
    directory: "/proxy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "andrewgibson-cic"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "fix(docker)"
      include: "scope"

  # Docker dependencies (agent)
  - package-ecosystem: "docker"
    directory: "/agent"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "andrewgibson-cic"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "fix(docker)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "andrewgibson-cic"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
