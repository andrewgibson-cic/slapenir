# SLAPENIR Test Workflow
# Runs comprehensive test suite on push and PR

name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  RUST_VERSION: 1.93.0
  PYTHON_VERSION: 3.11

jobs:
  proxy-tests:
    name: Proxy Tests (Rust)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v5
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v5
      with:
        path: proxy/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      working-directory: ./proxy
      run: cargo fmt -- --check
    
    - name: Run clippy
      working-directory: ./proxy
      run: cargo clippy -- -D warnings
      continue-on-error: true
      id: clippy
    
    - name: Run unit tests
      working-directory: ./proxy
      run: cargo test --lib --bins
      id: unit_tests
    
    - name: Run integration tests
      working-directory: ./proxy
      run: cargo test --test integration_test
      id: integration_tests
    
    - name: Run property-based tests
      working-directory: ./proxy
      run: cargo test --test property_test
      id: property_tests
    
    - name: Install tarpaulin
      working-directory: ./proxy
      run: cargo install cargo-tarpaulin --locked
    
    - name: Generate coverage report
      working-directory: ./proxy
      run: cargo tarpaulin --out Xml --output-dir . --timeout 300 --skip-clean
      continue-on-error: true
      id: coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./proxy/cobertura.xml
        flags: rust
        name: rust-coverage
        fail_ci_if_error: false
      continue-on-error: true
    
    - name: Generate test summary
      if: always()
      run: |
        echo "## 🦀 Proxy (Rust) Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Clippy | ${{ steps.clippy.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ steps.unit_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ steps.integration_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Property Tests | ${{ steps.property_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Coverage | ${{ steps.coverage.outcome }} |" >> $GITHUB_STEP_SUMMARY

  python-lint:
    name: Python Linting & Formatting
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff black
    
    - name: Run ruff linter
      run: |
        ruff check agent/scripts/ --output-format=github
      continue-on-error: true
    
    - name: Check formatting with black
      run: |
        black --check agent/scripts/
      continue-on-error: true
    
    - name: Generate lint report
      if: always()
      run: |
        echo "## 🐍 Python Code Quality" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Linting (ruff)" >> $GITHUB_STEP_SUMMARY
        ruff check agent/scripts/ --statistics || echo "⚠️ Linting issues found" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Formatting (black)" >> $GITHUB_STEP_SUMMARY
        black --check agent/scripts/ && echo "✅ Code is properly formatted" >> $GITHUB_STEP_SUMMARY || echo "⚠️ Formatting issues found" >> $GITHUB_STEP_SUMMARY

  benchmark-tests:
    name: Performance Benchmarks (Rust)
    runs-on: ubuntu-latest
    needs: [proxy-tests]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run benchmarks
      working-directory: ./proxy
      run: cargo bench -- --save-baseline main
      continue-on-error: true
      id: benchmarks
    
    - name: Generate benchmark summary
      if: always()
      run: |
        echo "## ⚡ Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Benchmarks completed and baseline saved." >> $GITHUB_STEP_SUMMARY

  security-tests:
    name: Security Tests (Rust)
    runs-on: ubuntu-latest
    needs: [proxy-tests]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
    
    - name: Run authorization boundary tests
      working-directory: ./proxy
      run: cargo test --test security/authorization_tests
      continue-on-error: true
      id: auth_tests
    
    - name: Run chaos/fault injection tests
      working-directory: ./proxy
      run: cargo test --test chaos/fault_injection_tests
      continue-on-error: true
      id: chaos_tests
    
    - name: Generate security test summary
      if: always()
      run: |
        echo "## 🔒 Security Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Authorization Tests | ${{ steps.auth_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Chaos/Fault Injection | ${{ steps.chaos_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY

  agent-tests:
    name: Agent Tests (Python)
    runs-on: ubuntu-latest
    needs: [python-lint]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Run basic tests
      run: python3 agent/tests/test_agent.py
      continue-on-error: true
      id: basic_tests
    
    - name: Run advanced tests
      run: python3 agent/tests/test_agent_advanced.py
      continue-on-error: true
      id: advanced_tests
    
    - name: Run security credential tests
      run: |
        # Run with pytest for better reporting
        pytest agent/tests/test_security_credentials.py -v --tb=short --no-header 2>&1 | tee test_results.txt
      continue-on-error: true
      id: security_tests
    
    - name: Generate test summary
      if: always()
      run: |
        echo "## 🧪 Agent Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Extract test results if pytest was used
        if [ -f test_results.txt ]; then
          # Count passed/failed/skipped
          PASSED=$(grep -oP '\d+ passed' test_results.txt | grep -oP '\d+' || echo "0")
          FAILED=$(grep -oP '\d+ failed' test_results.txt | grep -oP '\d+' || echo "0")
          SKIPPED=$(grep -oP '\d+ skipped' test_results.txt | grep -oP '\d+' || echo "0")
          
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
          echo "- ⏭️ Skipped: $SKIPPED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract failed test names
          if [ "$FAILED" != "0" ]; then
            echo "### ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep "FAILED" test_results.txt | head -20 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "### 📝 Note" >> $GITHUB_STEP_SUMMARY
            echo "These tests expect the agent to run in a containerized environment." >> $GITHUB_STEP_SUMMARY
            echo "Some failures in CI are expected when tests check for container-specific files/paths." >> $GITHUB_STEP_SUMMARY
          fi
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Test Status" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Basic Tests | ${{ steps.basic_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Advanced Tests | ${{ steps.advanced_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Tests | ${{ steps.security_tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
    
    - name: Create .env file for CI
      run: |
        # Create .env from .env.example for CI
        cp .env.example .env
        echo "" >> .env
        echo "# CI environment - dummy credentials only" >> .env
        echo "ENVIRONMENT=ci" >> .env
        echo "" >> .env
        echo "# Required passwords for CI (not production secrets)" >> .env
        echo "POSTGRES_PASSWORD=ci-dummy-password" >> .env
        echo "GRAFANA_ADMIN_PASSWORD=ci-dummy-password" >> .env
        echo "STEPCA_PASSWORD=ci-dummy-password" >> .env
        echo "" >> .env
        echo "# SSH agent socket (dummy for CI)" >> .env
        echo "SSH_AUTH_SOCK=/tmp/dummy-ssh-agent.sock" >> .env
        # Create dummy socket file so docker compose doesn't fail
        touch /tmp/dummy-ssh-agent.sock
        echo "" >> .env
        echo "# Disable proxy for Docker image pulls (CI has direct internet)" >> .env
        echo "HTTP_PROXY=" >> .env
        echo "HTTPS_PROXY=" >> .env
        echo "NO_PROXY=" >> .env

    - name: Generate coverage report
      run: |
        pytest agent/tests/ --cov=agent/scripts --cov-report=xml || true
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: agent
        name: agent-coverage
      continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [proxy-tests, agent-tests]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Create .env file for CI
      run: |
        # Create .env from .env.example for CI
        cp .env.example .env
        echo "" >> .env
        echo "# CI environment - dummy credentials only" >> .env
        echo "ENVIRONMENT=ci" >> .env
        echo "" >> .env
        echo "# Required passwords for CI (not production secrets)" >> .env
        echo "POSTGRES_PASSWORD=ci-dummy-password" >> .env
        echo "GRAFANA_ADMIN_PASSWORD=ci-dummy-password" >> .env
        echo "STEPCA_PASSWORD=ci-dummy-password" >> .env
        echo "" >> .env
        echo "# SSH agent socket (dummy for CI)" >> .env
        echo "SSH_AUTH_SOCK=/tmp/dummy-ssh-agent.sock" >> .env
        # Create dummy socket file so docker compose doesn't fail
        touch /tmp/dummy-ssh-agent.sock
        echo "" >> .env
        echo "# Disable proxy for Docker image pulls (CI has direct internet)" >> .env
        echo "HTTP_PROXY=" >> .env
        echo "HTTPS_PROXY=" >> .env
        echo "NO_PROXY=" >> .env

    
    - name: Validate docker-compose
      run: docker compose config
    
    - name: Build services
      run: docker compose build
      timeout-minutes: 10
    
    - name: Start services
      run: docker compose up -d
    
    - name: Wait for services
      run: |
        echo "Waiting for services to be ready..."
        sleep 10
        docker compose ps
    
    - name: Test proxy health
      run: |
        curl -f http://localhost:3000/health || exit 1
      continue-on-error: true
      id: proxy_health
    
    - name: Generate integration summary
      if: always()
      run: |
        echo "## 🐳 Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Proxy Health | ${{ steps.proxy_health.outcome }} |" >> $GITHUB_STEP_SUMMARY
    
    - name: Check service logs
      if: always()
      run: |
        echo "### Proxy Logs" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        docker compose logs proxy | tail -50 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Agent Logs" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        docker compose logs agent | tail -50 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    
    - name: Stop services
      if: always()
      run: docker compose down

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
    
    - name: Run cargo audit
      working-directory: ./proxy
      run: |
        cargo install cargo-audit --locked
        cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0134 || true
      continue-on-error: true
      id: cargo_audit
    
    - name: Run cargo deny
      working-directory: ./proxy
      run: |
        cargo install cargo-deny
        cargo deny check
      continue-on-error: true
      id: cargo_deny
    
    - name: Generate security summary
      if: always()
      run: |
        echo "## 🔒 Security Audit Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| cargo-audit | ${{ steps.cargo_audit.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| cargo-deny | ${{ steps.cargo_deny.outcome }} |" >> $GITHUB_STEP_SUMMARY

  load-tests:
    name: Load Testing (k6)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install k6
      run: |
        curl https://github.com/grafana/k6/releases/download/v0.47.0/k6-v0.47.0-linux-amd64.tar.gz -L | tar xvz
        sudo mv k6-*/k6 /usr/local/bin/
    
    - name: Start services
      run: |
        cp .env.example .env
        echo "ENVIRONMENT=ci" >> .env
        docker compose up -d
        sleep 10
    
    - name: Run API load tests
      working-directory: ./proxy/tests/load
      run: |
        PROXY_URL=http://localhost:3000 k6 run api_load.js --out json=api-load-results.json
      continue-on-error: true
      id: api_load
    
    - name: Run stress tests
      working-directory: ./proxy/tests/load
      run: |
        PROXY_URL=http://localhost:3000 k6 run stress_test.js --out json=stress-test-results.json
      continue-on-error: true
      id: stress_test
    
    - name: Generate load test summary
      if: always()
      run: |
        echo "## 📈 Load Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| API Load Test | ${{ steps.api_load.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Stress Test | ${{ steps.stress_test.outcome }} |" >> $GITHUB_STEP_SUMMARY
    
    - name: Stop services
      if: always()
      run: docker compose down

  mutation-tests:
    name: Mutation Testing (cargo-mutants)
    runs-on: ubuntu-latest
    needs: [proxy-tests]
    if: github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        profile: minimal
        override: true
    
    - name: Install cargo-mutants
      working-directory: ./proxy
      run: cargo install cargo-mutants
    
    - name: Run mutation tests
      working-directory: ./proxy
      run: |
        cargo mutants \
          --jobs 4 \
          --timeout 60 \
          --output html \
          --output json
      continue-on-error: true
      id: mutation_tests
    
    - name: Upload mutation results
      uses: actions/upload-artifact@v4
      with:
        name: mutation-results
        path: proxy/mutants-out/
      continue-on-error: true
    
    - name: Generate mutation test summary
      if: always()
      run: |
        echo "## 🧬 Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Mutation testing completed. Results uploaded as artifacts." >> $GITHUB_STEP_SUMMARY

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [proxy-tests, benchmark-tests, security-tests, agent-tests, integration-tests, load-tests, security-audit, mutation-tests]
    if: always()
    
    steps:
    - name: Generate overall summary
      run: |
        echo "# 📊 Complete Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Job Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Proxy Tests (Rust) | ${{ needs.proxy-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Performance Benchmarks | ${{ needs.benchmark-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Tests | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Agent Tests (Python) | ${{ needs.agent-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Load Tests | ${{ needs.load-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Mutation Tests | ${{ needs.mutation-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "*View detailed results in individual job summaries above*" >> $GITHUB_STEP_SUMMARY