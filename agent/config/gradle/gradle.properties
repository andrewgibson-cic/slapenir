# Gradle proxy configuration for isolated builds
# All traffic routes through SLAPENIR proxy

# HTTP proxy
systemProp.http.proxyHost=proxy
systemProp.http.proxyPort=3000

# HTTPS proxy
systemProp.https.proxyHost=proxy
systemProp.https.proxyPort=3000

# Non-proxy hosts (bypass proxy for these)
systemProp.http.nonProxyHosts=localhost|127.0.0.1|proxy|postgres|host.docker.internal|memgraph

# Disable Gradle daemon for isolated builds (cleaner process management)
org.gradle.daemon=false

# Enable build cache for dependency reuse
org.gradle.caching=true

# Console output
org.gradle.console=plain

# Disable rich console (prevents escape codes in logs)
org.gradle.console=auto

# Parallel builds
org.gradle.parallel=true

# Build optimization
org.gradle.configureondemand=true

# JVM settings
org.gradle.jvmargs=-Xmx2g -Xms512m -XX:+HeapDumpOnOutOfMemoryError

# Disable Gradle analytics
org.gradle.internal.launcher.welcomeMessageEnabled=false
