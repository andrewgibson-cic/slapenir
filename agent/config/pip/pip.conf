# pip proxy configuration for isolated builds
# All traffic routes through SLAPENIR proxy

[global]
# Proxy settings
proxy = http://proxy:3000

# Trusted hosts (proxy handles SSL)
trusted-host = 
    pypi.org
    pypi.python.org
    files.pythonhosted.org

# Disable pip version check (no telemetry)
disable-pip-version-check = true

# Cache directory
cache-dir = /home/agent/.cache/pip

# Timeout
timeout = 60

# Require virtual environment for safety (comment out if needed)
# require-virtualenv = true

[install]
# Prefer binary packages (faster, more reliable)
prefer-binary = true

# No compile (faster installs)
no-compile = false

[download]
# Proxy for downloads
proxy = http://proxy:3000
