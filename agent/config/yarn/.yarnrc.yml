# yarn proxy configuration for isolated builds
# All traffic routes through SLAPENIR proxy

# Proxy settings
httpProxy: "http://proxy:3000"
httpsProxy: "http://proxy:3000"

# Registry
npmRegistryServer: "https://registry.npmjs.org"

# Strict lock file enforcement
preferFrozenLockfile: true

# Disable telemetry
enableTelemetry: false

# Cache settings
cacheFolder: "/home/agent/.yarn/cache"

# Global folder
globalFolder: "/home/agent/.yarn/global"

# Install state
installStatePath: "/home/agent/.yarn/install-state.gz"

# Lockfile
lockfileFilename: "yarn.lock"

# Disable interactive prompts
enableInteractiveMode: false

# Network settings
httpTimeout: 60000
