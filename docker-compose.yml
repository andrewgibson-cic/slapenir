# SLAPENIR: Secure LLM Agent Proxy Environment
# Phase 1: Identity & Foundation - Step-CA Certificate Authority

services:
  # ============================================================================
  # Step-CA: Certificate Authority for mTLS
  # ============================================================================
  step-ca:
    image: smallstep/step-ca:latest
    container_name: slapenir-ca
    hostname: ca
    networks:
      - slape-net
    ports:
      - "9000:9000"  # CA API (internal only, exposed for initial setup)
    volumes:
      - step-ca-config:/home/step
    environment:
      - DOCKER_STEPCA_INIT_NAME=SLAPENIR-CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=ca,step-ca,localhost
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
      - DOCKER_STEPCA_INIT_PASSWORD=${STEPCA_PASSWORD:-slapenir-dev-password-CHANGE-ME}
      - DOCKER_STEPCA_INIT_ADDRESS=:9000
    healthcheck:
      test: ["CMD", "step", "ca", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    labels:
      - "slapenir.service=ca"
      - "slapenir.phase=1"

  # ============================================================================
  # Memgraph: Graph database for Code-Graph-RAG
  # ============================================================================
  memgraph:
    image: memgraph/memgraph:latest
    container_name: slapenir-memgraph
    hostname: memgraph
    networks:
      - slape-net
    ports:
      - "7687:7687"  # Bolt protocol
    volumes:
      - memgraph-data:/var/lib/memgraph
    environment:
      - MEMGRAPH_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 7687)); s.close()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "slapenir.service=memgraph"
      - "slapenir.phase=graph-rag"
    command: ["--log-level=INFO"]

  # ============================================================================
  # Memgraph Lab: Web UI for graph visualization
  # ============================================================================
  memgraph-lab:
    image: memgraph/lab:latest
    container_name: slapenir-memgraph-lab
    hostname: memgraph-lab
    networks:
      - slape-net
    ports:
      - "7688:3000"  # Web UI on port 7688
    environment:
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
    depends_on:
      memgraph:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "slapenir.service=memgraph-lab"
      - "slapenir.phase=graph-rag"

  # ============================================================================
  # PostgreSQL: Database for auto-detection API definitions
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: slapenir-postgres
    hostname: postgres
    networks:
      - slape-net
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-slapenir}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slapenir-dev-password}
      - POSTGRES_DB=${POSTGRES_DB:-slapenir}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./proxy/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slapenir}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - "slapenir.service=postgres"

  # ============================================================================
  # Proxy: Rust-based sanitizing gateway
  # ============================================================================
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: slapenir-proxy
    hostname: proxy
    networks:
      - slape-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"  # Proxy API (expose for testing)
    env_file:
      - .env  # Load REAL credentials from host .env
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgres://${POSTGRES_USER:-slapenir}:${POSTGRES_PASSWORD:-slapenir-dev-password}@postgres:5432/${POSTGRES_DB:-slapenir}
      - AUTO_DETECT_ENABLED=${AUTO_DETECT_ENABLED:-true}
      - MTLS_ENABLED=${MTLS_ENABLED:-false}
      - MTLS_ENFORCE=${MTLS_ENFORCE:-false}
      - MTLS_CA_CERT=/certs/root_ca.crt
      - MTLS_SERVER_CERT=/certs/proxy.crt
      - MTLS_SERVER_KEY=/certs/proxy.key
    volumes:
      - ./proxy/config.yaml:/app/config.yaml:ro
      - proxy-certs:/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      step-ca:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      - "slapenir.service=proxy"
      - "slapenir.phase=2"

  # ============================================================================
  # Agent: Wolfi-based Python execution environment
  # ============================================================================
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: slapenir-agent
    hostname: agent
    networks:
      - slape-net
    # Enable host.docker.internal resolution for local services (llama-server, etc.)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Required for iptables traffic enforcement
    cap_add:
      - NET_ADMIN
    # Security fix: Mount .env as read-only, generate dummy version on startup
    environment:
      - PYTHONUNBUFFERED=1
      - TRAFFIC_ENFORCEMENT_ENABLED=${TRAFFIC_ENFORCEMENT_ENABLED:-true}
      # Proxy configuration for agent (all traffic through proxy)
      - HTTP_PROXY=http://proxy:3000
      - HTTPS_PROXY=http://proxy:3000
      - NO_PROXY=localhost,127.0.0.1,proxy,postgres,host.docker.internal
      # mTLS Configuration
      - MTLS_ENABLED=${MTLS_ENABLED:-false}
      - MTLS_CA_CERT=/certs/root_ca.crt
      - MTLS_CLIENT_CERT=/certs/agent.crt
      - MTLS_CLIENT_KEY=/certs/agent.key
      - MTLS_VERIFY_HOSTNAME=${MTLS_VERIFY_HOSTNAME:-true}
      # OpenCode Configuration
      - OPENCODE_DISABLE_CLAUDE_CODE=${OPENCODE_DISABLE_CLAUDE_CODE:-1}
      - LLAMA_SERVER_HOST=${LLAMA_SERVER_HOST:-host.docker.internal}
      - LLAMA_SERVER_PORT=${LLAMA_SERVER_PORT:-6666}
      - OPENCODE_CONFIG_PATH=/home/agent/.config/opencode/opencode.json
      - OPENCODE_YOLO=true
      # Code-Graph-RAG Configuration
      - ORCHESTRATOR_PROVIDER=openai
      - ORCHESTRATOR_ENDPOINT=${ORCHESTRATOR_ENDPOINT:-http://host.docker.internal:6666/v1}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY:-sk-local}
      - CYPHER_PROVIDER=openai
      - CYPHER_ENDPOINT=${CYPHER_ENDPOINT:-http://host.docker.internal:6666/v1}
      - CYPHER_API_KEY=${CYPHER_API_KEY:-sk-local}
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
      # SSH/GPG Agent forwarding for git operations
      - SSH_AUTH_SOCK=/home/agent/.ssh/agent.sock
      - GPG_KEY=${GPG_KEY:-164DA43B214F0144}
      # GIT - Allow all workspace subdirectories as safe
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=*
    volumes:
      - ./.env:/host-env/.env:ro  # Mount host .env read-only for processing
      - ${HOME}/.claude:/home/agent/.claude:ro  # Claude settings and memory
      - agent-workspace:/home/agent/workspace
      - agent-certs:/certs:ro  # Read-only certificate access
      - agent-ssh:/home/agent/.ssh  # Persist SSH keys
      # SSH agent socket (requires forwardAgent: true in colima.yaml)
      # Uses host's SSH_AUTH_SOCK - ensure agent is running and keys are added
      - ${SSH_AUTH_SOCK}:/home/agent/.ssh/agent.sock:ro
      # OpenCode commands and skills (for slash commands in container)
      - ${HOME}/.config/opencode/commands:/home/agent/.config/opencode/commands:ro
      - ${HOME}/.config/opencode/skills:/home/agent/.config/opencode/skills:ro
      # Claude Code global commands and skills (mounted to ~/.opencode for OpenCode discovery)
      - ${HOME}/.claude/commands:/home/agent/.opencode/commands:ro
      - ${HOME}/.claude/skills:/home/agent/.opencode/skills:ro
      # Git config with conditional includes (for signed commits)
      - ~/.gitconfig:/home/agent/.gitconfig:ro
      - ~/.gitconfig-ho:/home/agent/.gitconfig-ho:ro
      - ~/.gitconfig-ibm:/home/agent/.gitconfig-ibm:ro
      - ~/.gitconfig-personal:/home/agent/.gitconfig-personal:ro
      # SSH config (keys accessed via agent socket)
      # Mount as config.host so setup script can filter macOS-specific options
      - ~/.ssh/config:/home/agent/.ssh/config.host:ro
      - ~/.ssh/known_hosts:/home/agent/.ssh/known_hosts
      # GPG public data (agent socket mounted at runtime via dev.sh)
      - ~/.gnupg/pubring.kbx:/home/agent/.gnupg/pubring.kbx:ro
      - ~/.gnupg/trustdb.gpg:/home/agent/.gnupg/trustdb.gpg:ro
    healthcheck:
      test: |
        python3 -c "import sys; sys.exit(0)" && \
        command -v opencode >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    labels:
      - "slapenir.service=agent"
      - "slapenir.phase=3"

  # ============================================================================
  # Pumba: Chaos Testing Engine
  # ============================================================================
  pumba:
    image: gaiaadm/pumba:latest
    container_name: slapenir-pumba
    hostname: pumba
    networks:
      - slape-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["--log-level", "info", "--interval", "30s", "--random", "pause", "--duration", "10s", "re2:slapenir-(proxy|agent)"]
    profiles:
      - chaos  # Only run when explicitly enabled
    depends_on:
      - proxy
      - agent
    labels:
      - "slapenir.service=pumba"
      - "slapenir.phase=5"
      - "slapenir.chaos=enabled"
    restart: "no"  # Manual control for chaos testing

  # ============================================================================
  # Prometheus: Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: slapenir-prometheus
    hostname: prometheus
    networks:
      - slape-net
    ports:
      - "9090:9090"  # Prometheus UI
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - proxy
      - agent
    labels:
      - "slapenir.service=prometheus"
      - "slapenir.phase=6"
      - "slapenir.monitoring=enabled"

  # ============================================================================
  # Grafana: Metrics Visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: slapenir-grafana
    hostname: grafana
    networks:
      - slape-net
    ports:
      - "3001:3000"  # Grafana UI (avoid conflict with proxy)
    # Conditional DNS configuration based on environment
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-slapenir-dev-password-CHANGE-ME}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=
      # Authentication configuration
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_LDAP_ENABLED=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Disable external calls in production, allow in development
      - GF_ANALYTICS_REPORTING_ENABLED=${ENVIRONMENT:-development}
      - GF_ANALYTICS_CHECK_FOR_UPDATES=${ENVIRONMENT:-development}
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - prometheus
    labels:
      - "slapenir.service=grafana"
      - "slapenir.phase=6"
      - "slapenir.monitoring=enabled"

# ============================================================================
# Networks
# ============================================================================
networks:
  slape-net:
    name: slape-net
    driver: bridge
    # Enable external routing for local LLM access (host.docker.internal)
    # Security is maintained through iptables traffic enforcement:
    #   - DNS filtering (only trusted servers)
    #   - Mandatory startup validation
    #   - Runtime monitoring with auto-shutdown
    #   - All traffic through proxy or explicitly whitelisted
    # Set NETWORK_INTERNAL=true for maximum isolation (no local LLM support)
    internal: ${NETWORK_INTERNAL:-false}
    ipam:
      config:
        - subnet: 172.30.0.0/24
    labels:
      - "slapenir.network=external-routing-enabled"
      - "slapenir.security=iptables-enforced"

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    name: slapenir-postgres-data
    labels:
      - "slapenir.volume=postgres-data"

  step-ca-config:
    name: slapenir-ca-config
    labels:
      - "slapenir.volume=ca-config"
  
  step-ca-certs:
    name: slapenir-ca-certs
    labels:
      - "slapenir.volume=ca-certs"
  
  proxy-certs:
    name: slapenir-proxy-certs
    labels:
      - "slapenir.volume=proxy-certs"
      - "slapenir.mtls=enabled"
  
  agent-certs:
    name: slapenir-agent-certs
    labels:
      - "slapenir.volume=agent-certs"
      - "slapenir.mtls=enabled"
  
  agent-workspace:
    name: slapenir-agent-workspace
    labels:
      - "slapenir.volume=agent-workspace"
  
  agent-ssh:
    name: slapenir-agent-ssh
    labels:
      - "slapenir.volume=agent-ssh"
      - "slapenir.persistence=ssh-keys"
  
  prometheus-data:
    name: slapenir-prometheus-data
    labels:
      - "slapenir.volume=prometheus-data"
      - "slapenir.monitoring=enabled"
  
  memgraph-data:
    name: slapenir-memgraph-data
    labels:
      - "slapenir.volume=memgraph-data"
      - "slapenir.phase=graph-rag"

  grafana-data:
    name: slapenir-grafana-data
    labels:
      - "slapenir.volume=grafana-data"
      - "slapenir.monitoring=enabled"
